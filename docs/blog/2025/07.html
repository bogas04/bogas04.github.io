ld leave the UI visibly stuck for more than two seconds. The fun part was getting from that symptom to the underlying cause without turning the fix into a rewrite.\u003c/p\u003e\n\u003cp\u003eWe used simple visual measurements to see the repeated renders, then narrowed the blast radius with smaller hooks, selectors, and batching. Each change was surgical: reduce the work that was actually happening instead of papering over it with a loading state or a new state-management migration.\u003c/p\u003e\n\u003cp\u003eThe result was a much smoother interaction and a reminder I keep coming back to: performance debugging gets much easier once the measurement is concrete enough to make the bottleneck obvious.\u003c/p\u003e\n\u003cp\u003eRead the full story on \u003ca href=\"https://medium.com/engineering-udaan/how-we-solved-a-2s-stutter-caused-by-re-rendering-react-components-5b852ca1852a\"\u003eudaan engineering\u003c/a\u003e.\u003c/p\u003e\n","fileName":"How we fixed a 2 second React Native stutter at udaan.md","readingTimeMinutes":1}],"monthName":"July 2025","year":"2025","month":"07"},"__N_SSG":true},"page":"/blog/[year]/[month]","query":{"year":"2025","month":"07"},"buildId":"AJwyyoNUuUrG_2erPl38S","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
