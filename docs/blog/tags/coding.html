 type of version control system. I’m guessing you must have faced some friction initially, how it breaks your flow, how you just can’t merge to master without rebasing/merging changes in first.\u003c/p\u003e\n\u003cp\u003eDespite that, you might agree today that it’s actually very helpful in collaborating with the team, and those pain points were necessary to get here.\u003c/p\u003e\n\u003cp\u003eMonorepos are somewhat similar.\u003c/p\u003e\n\u003cp\u003eWhile git was solving problems around managing single codebase with multiple team members or just better versioning, Monorepo kind of does the same but for multiple projects/codebases.\u003c/p\u003e\n\u003ch3 id=\"user-content-the-what\"\u003e\u003ca href=\"#the-what\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eThe what.\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eIs Monorepo that cool font I see on Twitter?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/1__ZzlBaQH6w1BgwZdo3bIYRQ.png\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/1__ZzlBaQH6w1BgwZdo3bIYRQ.png\" alt=\"Image credits: undraw\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eBefore diving into the topic, let’s first understand what Monorepo truly means. This is what Wikipedia has to say:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eIn revision control systems, a Monorepo is a software development strategy where code for many projects are stored in the same repository.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eIn other words, your ‘Work’ folder is close to what a Monorepo would look like. It would have packages that deal with server, web app, native app, documentation, etc.\u003c/p\u003e\n\u003cp\u003eThis is different from a ‘monolith’ where all your application logic is\u003cbr\u003e\ncentralized to one entry point as opposed to distributed services (microservices).\u003c/p\u003e\n\u003cp\u003eWhile code for various services would sit in a single repository, it doesn’t mean it would be deployed as a single entity, just like your ‘Work’ folder. Individual projects have separate life-cycles.\u003c/p\u003e\n\u003ch3 id=\"user-content-the-why\"\u003e\u003ca href=\"#the-why\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eThe why.\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eSo, do I just \u003ccode\u003egit add\u003c/code\u003e my entire ‘Work’ folder?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e“Why would you want to do this? Whatever happened to separation of concern?”\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThere are several arguments both in favour and against Monorepos. And I don’t mean “Oh Google uses it” kind of arguments. This blog will give a sneak-peek into our problems and Monorepo’s solutions to them.\u003c/p\u003e\n\u003cp\u003eRegardless, I recommend that you identify the problems your codebase is facing, and see if Monorepo is truly the answer to those.\u003c/p\u003e\n\u003ch3 id=\"user-content-the-story\"\u003e\u003ca href=\"#the-story\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eThe story.\u003c/h3\u003e\n\u003cp\u003eBefore moving to Monorepo, we as a team worked on 3 codebases at the same time;\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003edweb\u003c/strong\u003e (Desktop website of Swiggy)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003emweb\u003c/strong\u003e (Mobile website of Swiggy)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eservice\u003c/strong\u003e (API proxy NodeJS middleware, used by dweb and mweb)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWhen I say work, I mean writing features, updating build pipeline, reviewing code and fixing bugs.\u003c/p\u003e\n\u003cp\u003eAs the codebases grew, we recognized some patterns:\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/1____L__bUfSLVT6EboXRO7SSGg.png\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/1____L__bUfSLVT6EboXRO7SSGg.png\" alt=\"Image credits: undraw\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eFeatures written on mweb, while dissimilar enough to not to be dragged and dropped to dweb, held enough similarities to be broken into reusable parts.\u003c/li\u003e\n\u003cli\u003eFixes that go on mweb are also needed on dweb.\u003c/li\u003e\n\u003cli\u003eCode reviewers often ended up reviewing the same code (between mweb and dweb) in a slightly different context.\u003c/li\u003e\n\u003cli\u003eCode review changes on dweb are also relevant to mweb\u003c/li\u003e\n\u003cli\u003eChanges to contracts of service, a common dependency, are also needed to be individually coded, tested, and reviewed.\u003c/li\u003e\n\u003cli\u003eUpdating dependencies like \u003ca href=\"https://reactjs.org/\"\u003eReact\u003c/a\u003e/\u003ca href=\"https://webpack.js.org/\"\u003eWebpack\u003c/a\u003e/\u003ca href=\"https://babeljs.io/\"\u003eBabel\u003c/a\u003e becomes cumbersome between the two codebases.\u003c/li\u003e\n\u003cli\u003eConventions are difficult to enforce between the three repositories. One has an older version of \u003ca href=\"https://eslint.org/\"\u003eESLint\u003c/a\u003e, one hasn’t been updated when new lint rules were added, one is still using old test runner.\u003c/li\u003e\n\u003cli\u003eAttempts to make a new repository to keep common code failed due to the amount of setup and code management. Imagine working with multiple team members on multiple repositories with multiple Pull Requests.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAs you can see, while the projects are very different (check out \u003ca href=\"https://portal-sentry.swiggyapp.com/settings/swiggy/go-front-staging/keys/\"\u003eswiggy.com\u003c/a\u003e on your desktop and mobile to realize that), they still have quite a lot of common code interactions.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eBike-shedding: Have you tried \u003ca href=\"https://www.swiggy.com?utm_source=medium\"\u003eSwiggy\u003c/a\u003e website on your desktop or mobile browser? We would love to hear your feedback!\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3 id=\"user-content-the-how\"\u003e\u003ca href=\"#the-how\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eThe how.\u003c/h3\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/1__0WjBWfdkbcob39FMklwp7A.png\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/1__0WjBWfdkbcob39FMklwp7A.png\" alt=\"Logo of Lerna\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://lerna.js.org/\"\u003ehttps://lerna.js.org/\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eDepending on your ecosystem, there will be different tools to help you with maintaining a Monorepo. You can obviously go vanilla and just use different folders per project. We use \u003ca href=\"https://lerna.js.org/\"\u003eLerna\u003c/a\u003e for maintaining our JavaScript codebase.\u003c/p\u003e\n\u003cp\u003eThanks to its community, there’s a \u003ca href=\"https://github.com/lerna/lerna/tree/master/commands/publish\"\u003elot\u003c/a\u003e \u003ca href=\"https://github.com/lerna/lerna/blob/master/FAQ.md\"\u003eof\u003c/a\u003e \u003ca href=\"https://lerna.js.org/#commands\"\u003edocumentation\u003c/a\u003e and \u003ca href=\"https://medium.com/mitterio/multirepo-to-lerna-js-monorepo-80f6657cb443\"\u003ehelp\u003c/a\u003e for Lerna \u003ca href=\"https://github.com/lerna/lerna/blob/master/doc/troubleshooting.md\"\u003erelated\u003c/a\u003e \u003ca href=\"https://github.com/lerna/lerna/blob/master/doc/guides.md\"\u003equeries\u003c/a\u003e.\u003c/p\u003e\n\u003cdiv\u003e\u003cpre\u003e\u003ccode\u003e\u003cspan\u003e# Install lerna globally\u003c/span\u003e\n\u003cspan\u003enpm\u003c/span\u003e i \u003cspan\u003e-g\u003c/span\u003e lerna\n\n\u003cspan\u003e# Change directory to your work folder\u003c/span\u003e\n\u003cspan\u003ecd\u003c/span\u003e ~/Work\n\n\u003cspan\u003e# Make the folder you want to keep your monorepo in\u003c/span\u003e\n\u003cspan\u003emkdir\u003c/span\u003e portal-web\n\n\u003cspan\u003e# Change directory to monorepo folder\u003c/span\u003e\n\u003cspan\u003ecd\u003c/span\u003e portal-web\n\n\u003cspan\u003e# Initialize lerna (it will handle `git init`)\u003c/span\u003e\nlerna init\n\n\u003cspan\u003e# Commit the changes\u003c/span\u003e\n\u003cspan\u003egit\u003c/span\u003e \u003cspan\u003eadd\u003c/span\u003e \u003cspan\u003e.\u003c/span\u003e \u003cspan\u003e\u0026#x26;\u0026#x26;\u003c/span\u003e \u003cspan\u003egit\u003c/span\u003e commit \u003cspan\u003e-m\u003c/span\u003e \u003cspan\u003e\"Initial commit\"\u003c/span\u003e\n\n\u003cspan\u003e# Import other packages (https://github.com/lerna/lerna/tree/master/commands/import)\u003c/span\u003e\nlerna \u003cspan\u003eimport\u003c/span\u003e ~/Work/portal-mweb\n\n\u003cspan\u003e# That's pretty much it!\u003c/span\u003e\n\n\u003cspan\u003e# Fun fact: If you want to rename your package, simply rename the folder before importing.\u003c/span\u003e\n\u003cspan\u003e# Fun fact 2: You might need to flatten out the commits in most cases (https://github.com/lerna/lerna/tree/master/commands/import#--flatten)\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp\u003eYou may use \u003ca href=\"https://gist.github.com/bogas04/874731db80967c040209fea396bf7804\"\u003eabove scripts\u003c/a\u003e to import existing repositories to a lerna based monorepo.\u003c/p\u003e\n\u003cp\u003eRunning scripts from the root has been made simpler using these handy \u003ca href=\"https://docs.npmjs.com/misc/scripts\"\u003enpm scripts\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eThese scripts allow for convenient way to invoke package scripts from root folder\u003c/p\u003e\n\u003cp\u003eSince our packages are hosted in \u003ca href=\"https://verdaccio.org/\"\u003einternal npm registry\u003c/a\u003e, we inject a .npmrc in our \u003ca href=\"https://jenkins.io/\"\u003eJenkins\u003c/a\u003e build the pipeline to avoid committing the authToken.\u003c/p\u003e\n\u003cp\u003eA script to find all scoped dependencies of a project\u003c/p\u003e\n\u003cdiv\u003e\u003cpre\u003e\u003ccode\u003e\u003cspan\u003e# Install monorepo dependencies from internal npm registry\u003c/span\u003e\n\u003cspan\u003enpm\u003c/span\u003e i \u003cspan\u003e\u003cspan\u003e`\u003c/span\u003e\u003cspan\u003e..\u003c/span\u003e/\u003cspan\u003e..\u003c/span\u003e/scripts/scope-packages.js @portal\u003cspan\u003e`\u003c/span\u003e\u003c/span\u003e\n\n\u003cspan\u003e# Fun fact:\u003c/span\u003e\n\u003cspan\u003e# `npm i \u0026#x3C;package-name\u003e` would also install other dependencies if they aren't present in node_modules,\u003c/span\u003e\n\u003cspan\u003e# along with the mentioned \u0026#x3C;package-name\u003e\u003c/span\u003e\n\n\u003cspan\u003e# Fun fact 2:\u003c/span\u003e\n\u003cspan\u003e# In presence of package-lock.json, `npm i` would use those version numbers instead of fetching the latest ones\u003c/span\u003e\n\u003cspan\u003e# This essentially makes it a hybrid of `npm i` and `npm ci`\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp\u003eOne interesting thing about \u003ca href=\"https://lerna.js.org/\"\u003eLerna\u003c/a\u003e is that it \u003ca href=\"https://gist.github.com/bogas04/8c9702aba064b03b1162a0058c7b8f98\"\u003edoesn’t\u003c/a\u003e want private packages to be part of the \u003ccode\u003epackage-lock.json.\u003c/code\u003e This means we can’t just simply use \u003ccode\u003enpm ci\u003c/code\u003e. We use this bash script to get past that.\u003c/p\u003e\n\u003ch3 id=\"user-content-the-happypart\"\u003e\u003ca href=\"#the-happypart\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eThe happy part.\u003c/h3\u003e\n\u003cp\u003eWithin a few months of making this change, we tippled the number of packages in our Monorepo. We also saw much more work done on the linting front, leading to a more consistent codebase.\u003c/p\u003e\n\u003cp\u003eThe linter is common to entire Monorepo, and each new rule affects all the packages.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003econfig\u003c/strong\u003e (webpack config as a package, reused by mweb and dweb)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eui\u003c/strong\u003e (a package to create common patterns of design to be used in mobile and desktop, thus enabling us to work on creating a Swiggy’s design system)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003epayments\u003c/strong\u003e (a package of Swiggy’s payments page, used by multiple tenants)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ereviews\u003c/strong\u003e (a package of Swiggy’s Ratings and Reviews page and components, used by mweb and dweb)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ehelpers\u003c/strong\u003e (a package of common reusable logic, something like lodash)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003edaily\u003c/strong\u003e (swiggydaily.com, reuses 2 components from mweb)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ecache\u003c/strong\u003e (a caching module used by mweb and dweb)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003erestaurant-url\u003c/strong\u003e (a restaurant slug generator, multiple tenants)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/1__kvwGrM__62LBXWLHxH__QwGw.png\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/1__kvwGrM__62LBXWLHxH__QwGw.png\" alt=\"Image credits: undraw\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eI think that giving the option to easily create a new package incentivizes developers to think in more modular terms. They don’t think in the context of an app but rather in a more general way.\u003c/p\u003e\n\u003cp\u003eIt also discourages them from touching modules that are used by multiple tenants, and use \u003ca href=\"https://semver.org/\"\u003esemantic versioning\u003c/a\u003e appropriately.\u003c/p\u003e\n\u003cp\u003eThe benefits we are seeing out of this are just amazing:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eWriting the same fix for dweb and mweb is faster, as it’s just one commit.\u003c/li\u003e\n\u003cli\u003eNo more \u003ccode\u003enpm link\u003c/code\u003e mess.\u003c/li\u003e\n\u003cli\u003eReviewing a fix for both dweb and mweb is faster, as it’s just one Pull Request on one repository by one team member.\u003c/li\u003e\n\u003cli\u003eReusing and updating build pipeline is much more seamless.\u003c/li\u003e\n\u003cli\u003eUpdating major dependencies/lint rules is super easy.\u003c/li\u003e\n\u003cli\u003eThe collocation of code encourages developers to copy-paste less and reuse more.\u003c/li\u003e\n\u003cli\u003eWriting reusable modules becomes easier, leading to better software engineering.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"user-content-the-sadpart\"\u003e\u003ca href=\"#the-sadpart\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eThe sad part.\u003c/h3\u003e\n\u003cp\u003eBut it ain’t all fun. Our PR section is a bit noisier. It’s not like we’re somehow writing more code, but that changes to any package comes to spotlight and doesn’t get silently updated.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eToo many packages lead to longer bootstrap times.\u003c/li\u003e\n\u003cli\u003eLeveraging the benefits of Monorepo takes time.\u003c/li\u003e\n\u003cli\u003eThe code navigation is slightly slower. Developers are now opening individual packages to work around that.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cstrong\u003eUpdate:\u003c/strong\u003e There’s one more point I would like to touch upon. Our approach currently colocates applications with libraries. ‘mweb’ is a private package in the sense it isn’t published to our npm registry, however ‘ui’ is a public package that can be consumed by mulitple tenants. This leads to heterogeneity in the monorepo. We are okay with this mix as\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eit reduces friction of local development (no npm links).\u003c/li\u003e\n\u003cli\u003ecolocation leads to easy refactors and library creations.\u003c/li\u003e\n\u003cli\u003ecode review is simpler when it’s all one repository.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"user-content-the-verdict\"\u003e\u003ca href=\"#the-verdict\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eThe verdict.\u003c/h3\u003e\n\u003cp\u003eSo far we’re seeing Monorepo architecture a better fit for our growing codebase and team. It also impacts the way we design new libraries and components, often promoting clearer separations of concerns.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/1__O3UIYiDjYTXMAZd7GBMwVg.png\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/1__O3UIYiDjYTXMAZd7GBMwVg.png\" alt=\"Image credits: undraw\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eShould you use monorepo? Like all things, it depends on TM! I hope this blog gave enough insight to you as to why we started using a Monorepo, and how it’s benefiting us.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eDISCLAIMER: We don’t advocate for any of the tools, libraries, coding practices or software development philosophies mentioned here. You are welcome to read, learn, accept, reject and critique however you see fit.\u003c/p\u003e\n\u003c/blockquote\u003e\n","fileName":"Monorepos. Let’s talk about it.md","readingTimeMinutes":8}]},"__N_SSG":true},"page":"/blog/tags/[tag]","query":{"tag":"coding"},"buildId":"AJwyyoNUuUrG_2erPl38S","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
