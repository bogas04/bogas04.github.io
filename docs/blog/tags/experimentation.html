3e\n\u003cp\u003eI also wrote about a much more persistent problem at udaan: \u003ca href=\"https://medium.com/engineering-udaan/reacting-to-change-tale-of-a-web-developer-improving-startup-performance-for-a-large-react-native-854f8a4850fd\"\u003eimproving startup performance for a large React Native app\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eStartup performance is an awkward problem because the first question is usually not “how do we fix it?” but “what exactly are we measuring?” The investigation taught me the value of useful telemetry, small experiments, and being honest when the data contradicted an appealing explanation.\u003c/p\u003e\n\u003cp\u003eIt was tempting to reach for a shiny migration or a sweeping upgrade. Instead, the valuable work was simplifying the startup path, validating one hypothesis at a time, and paying attention to how the app \u003cem\u003efelt\u003c/em\u003e as well as what the numbers reported.\u003c/p\u003e\n\u003cp\u003eThat approach made the work less glamorous, but much more reliable. It is a lesson I now carry into most performance work: simplify first, measure the change, and earn the complexity only when it is necessary.\u003c/p\u003e\n\u003cp\u003eRead the full story on \u003ca href=\"https://medium.com/engineering-udaan/reacting-to-change-tale-of-a-web-developer-improving-startup-performance-for-a-large-react-native-854f8a4850fd\"\u003eudaan engineering\u003c/a\u003e.\u003c/p\u003e\n","fileName":"What startup performance at udaan taught me.md","readingTimeMinutes":1}]},"__N_SSG":true},"page":"/blog/tags/[tag]","query":{"tag":"experimentation"},"buildId":"AJwyyoNUuUrG_2erPl38S","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
