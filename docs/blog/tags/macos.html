e menu bar\u003c/h3\u003e\n\u003cp\u003eRefer to \u003ca href=\"https://www.cnet.com/how-to/how-to-hide-the-menu-bar-in-os-x-el-capitan/\"\u003ethis\u003c/a\u003e article.\u003c/p\u003e\n\u003ch3 id=\"user-content-autohide-dock--disable-recent-applications\"\u003e\u003ca href=\"#autohide-dock--disable-recent-applications\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eAutohide dock \u0026#x26; disable recent applications\u003c/h3\u003e\n\u003cp\u003eI also like a clean setup, so I keep only essential items in the dock for quick access, for rest I use spotlight.\u003c/p\u003e\n\u003cp\u003eRefer to \u003ca href=\"https://www.cnet.com/how-to/macos-mojave-shows-recent-apps-in-the-dock-heres-how-to-hide-them/\"\u003ethis\u003c/a\u003e article.\u003c/p\u003e\n\u003ch2 id=\"user-content-git-default-push-to-current-branch\"\u003e\u003ca href=\"#git-default-push-to-current-branch\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eGit default push to current branch\u003c/h2\u003e\n\u003cdiv\u003e\u003cpre\u003e\u003ccode\u003e\u003cspan\u003egit\u003c/span\u003e config push.default current \u003cspan\u003e--global\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003ch2 id=\"user-content-oh-my-zsh-with-auto-suggest\"\u003e\u003ca href=\"#oh-my-zsh-with-auto-suggest\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eOh My ZSH with Auto Suggest\u003c/h2\u003e\n\u003cp\u003e\u003ca href=\"https://ohmyz.sh/\"\u003eOh my ZSH\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://github.com/zsh-users/zsh-autosuggestions/blob/master/INSTALL.md#oh-my-zsh\"\u003ezsh-autosuggestions plugin\u003c/a\u003e\u003c/p\u003e\n\u003ch2 id=\"user-content-keyboard-stuff\"\u003e\u003ca href=\"#keyboard-stuff\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eKeyboard stuff\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003eDisable \u003ccode\u003ecmd+option+space\u003c/code\u003e for spotlight history (System Preferences -\u003e Spotlight -\u003e Keyboard Shortcuts)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eSpotlight history is of no good use really, and that key combination can be utilized for a better purpose that we'll talk about later.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/spotlight-history.png\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/spotlight-history.png\" alt=\"Screenshot of spotlight keyboard settings\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eUse Caps lock as Escape (System Preferences -\u003e Keyboard -\u003e Modifier Keys)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAs a vim user, I'm used to keeping Caps Lock as Escape key.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/caps-escape.png\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/caps-escape.png\" alt=\"Screenshot of capslock modifier\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTurn on key repeating\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv\u003e\u003cpre\u003e\u003ccode\u003e\u003cspan\u003e# Open Terminal.app and past the following command.\u003c/span\u003e\ndefaults \u003cspan\u003ewrite\u003c/span\u003e \u003cspan\u003e-g\u003c/span\u003e ApplePressAndHoldEnabled \u003cspan\u003e-bool\u003c/span\u003e \u003cspan\u003efalse\u003c/span\u003e\n\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\u003cp\u003eI don't know why this isn't the default behaviour. I don't have much use for macOS's character suggestions on holding a key.\u003c/p\u003e\n\u003ch2 id=\"user-content-expanded-touchbar\"\u003e\u003ca href=\"#expanded-touchbar\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eExpanded TouchBar\u003c/h2\u003e\n\u003cp\u003eI prefer expanded touch bar over app specific touchbar.\nSystem Preferences \u003e Keyboard \u003e \"Touch Bar shows\" - Expanded Control Strip.\u003c/p\u003e\n\u003ch2 id=\"user-content-trackpad-stuff\"\u003e\u003ca href=\"#trackpad-stuff\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eTrackpad stuff\u003c/h2\u003e\n\u003ch3 id=\"user-content-enable-tap-to-click-system-preferences---trackpad\"\u003e\u003ca href=\"#enable-tap-to-click-system-preferences---trackpad\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eEnable tap to click (System Preferences -\u003e Trackpad)\u003c/h3\u003e\n\u003cp\u003eI prefer tap over physical clicks.\u003c/p\u003e\n\u003ch3 id=\"user-content-increase-cursor-size-system-preferences---accessibility---display\"\u003e\u003ca href=\"#increase-cursor-size-system-preferences---accessibility---display\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eIncrease cursor size (System Preferences -\u003e Accessibility -\u003e Display)\u003c/h3\u003e\n\u003cp\u003eA big cursor is easier to find and makes things easy to move around.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEnable dragging with three fingers (System Preferences -\u003e Accessibility -\u003e Trackpad -\u003e Trackpad Options)\u003c/li\u003e\n\u003cli\u003eClick and hold is worse experience in my opinion.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"user-content-application-stuff\"\u003e\u003ca href=\"#application-stuff\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eApplication stuff\u003c/h2\u003e\n\u003ch3 id=\"user-content-configure-spotlight-to-not-index-a-lot-of-stuff\"\u003e\u003ca href=\"#configure-spotlight-to-not-index-a-lot-of-stuff\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eConfigure spotlight to not index a lot of stuff.\u003c/h3\u003e\n\u003cp\u003eIn my setup, I don't need use spotlight to open files, so indexing them (\u003cem\u003ecough\u003c/em\u003e \u003ccode\u003enode_modules\u003c/code\u003e \u003cem\u003ecough\u003c/em\u003e) is unnecessary waste of resources.\u003c/p\u003e\n\u003ch3 id=\"user-content-install-rectangle\"\u003e\u003ca href=\"#install-rectangle\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eInstall \u003ca href=\"https://rectangleapp.com/\"\u003eRectangle\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eThis window management utility works with newer versions of macOS (even though now macOS supports tiling, it still sucks).\nConfigure it to use \u003ccode\u003ecmd+option+arrow-key\u003c/code\u003e for top/left/right/bottom and \u003ccode\u003ecmd+option+space\u003c/code\u003e for maximize\u003c/p\u003e\n\u003ch3 id=\"user-content-install-maccy\"\u003e\u003ca href=\"#install-maccy\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003eInstall \u003ca href=\"https://github.com/p0deje/Maccy\"\u003eMaccy\u003c/a\u003e\u003c/h3\u003e\n\u003cp\u003eClipboard management of my choice. I've started accepting the default options for my peace of mind.\u003c/p\u003e\n\u003ch2 id=\"user-content-dot-files\"\u003e\u003ca href=\"#dot-files\" aria-hidden=\"true\" tabindex=\"-1\"\u003e\u003cspan\u003e🔗 \u003c/span\u003e\u003c/a\u003edot-files\u003c/h2\u003e\n\u003cp\u003eIf you're interested in my dot-files, you can view them \u003ca href=\"https://github.com/bogas04/dot-files\"\u003ehere\u003c/a\u003e.\u003c/p\u003e\n","fileName":"my macos setup.md","readingTimeMinutes":2}]},"__N_SSG":true},"page":"/blog/tags/[tag]","query":{"tag":"macos"},"buildId":"AJwyyoNUuUrG_2erPl38S","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
