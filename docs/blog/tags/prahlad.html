3c/h2\u003e\n\u003cp\u003eWith Holi coming up and me witnessing a lot of turmoil in my personal life, I was forced to think about Holi in a very specific way. At risk of over-simplifying and appropriating the narrative, here are my unpopular views on the epic of Bhagat Prahlad and how it relates with \u003ca href=\"https://www.psychologytoday.com/us/blog/victim-victor/202011/is-how-narcissists-think\"\u003enarcissism\u003c/a\u003e and toxic \u003ca href=\"https://www.psychologytoday.com/us/blog/acquired-spontaneity/201708/why-patriarchy-is-not-about-men\"\u003epatriarchy\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/prahlad-1.jpg\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/prahlad-1.jpg\" alt=\"Prahlad in lap of his angry father\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eIf you are to believe the ancient epic of Bhagat Prahlad and Hirnaykashyap, AKA Harnaakash in Sikhi, you'll find some interesting things around patriarchal family dynamics. There was an ideological difference between Prahlad and his father. His father felt superior and he felt that he was worthy of worship. This inflated self-view was further exemplified by the fact that his province \u0026#x26; society agreed, thanks to his boon of invincibility.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/prahlad-2.jpg\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/prahlad-2.jpg\" alt=\"Bhagat Prahlad in pyre chanting Ram Ram while his father watches him burn\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003ePrahlad, on other hand, by grace of his own wisdom given by Narad, believed Vishnu to be his God. This was completely unacceptable to his narcissist father. Prahlad's defiance was followed by series of attempts by his father to get his son to conform to his ideology.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/prahlad-3.jpg\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/prahlad-3.jpg\" alt=\"Narad giving spiritual wisdom to Prahlad\u0026#x27;s pregnant mother\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eWhile the world around Hirnaykashyap believed him to be equivalent of God, Prahlad didn't bow down to his teachers, friends, sister and as well as his mother. He stood against and outright fought the entire world for his right to lead his life his way.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/prahlad-4.jpg\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/prahlad-4.jpg\" alt=\"Prahlad thrown off cliff only to be protected by Vishnu\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eImagine what a typical patriarchal mindset person in that era would have said. Wouldn't they instruct Prahald to leave his ego and just bow down to his parents? After all, his mother nurtured and nourished him, and his father took care of him, isn't it his moral obligation?\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/prahlad-5.jpg\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/prahlad-5.jpg\" alt=\"Prahlad preaching his friends about Vishnu\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eGuru Amardaas Jee, 3rd Guru of Sikhs, in his \u003ca href=\"http://sttm.co/s/4054/48255\"\u003erendition\u003c/a\u003e of the epic, shows how Prahlad talks back to his own mother.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/prahlad-6.jpg\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/prahlad-6.jpg\" alt=\"Shabad in Guru Granth Sahib showing how Bhagat Prahlad defies his mother\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eUltimately, after multiple attempts of coercing Prahlad, including multiple attempts of murder for not agreeing with his father, Prahlad was protected by Narsingh (an avatar of Vishnu) after He killed his father, thanks to some loop-hole in the invincibility spell.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/prahlad-7.jpg\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/prahlad-7.jpg\" alt=\"Narsingh killing Hirnaykashyap\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eMy point over here is that, since bygones we know of narcissism \u0026#x26; toxic patriarchy, and this story shows how a minor stood up against something he believed to be false and didn't bow down at all. In the world of obedient \u003ca href=\"https://en.wikipedia.org/wiki/Shravan\"\u003eShravan Kumar\u003c/a\u003e \u0026#x26; Raam, we also have disobedient Prahald.\u003c/p\u003e\n\u003cp\u003e\u003ca class=\"blog-image-link\" href=\"/img/blog/prahlad-8.jpg\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e\u003cimg src=\"/img/blog/prahlad-8.jpg\" alt=\"Shravan Kumar carrying his disabled parents\"\u003e\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eWhether you believe children should indeed never defy their parents, or that Prahlad was an exception because he was a devotee of Vishnu, truth is that Prahlad wasn't supported by anyone he could rely on (his parents, siblings, friends or school) but he didn't conform to them.\u003c/p\u003e\n\u003cp\u003eIn my opinion, the notion that children must be obedient to their parents is rejected by this story. Whether Prahlad was right or wrong, that's a separate ideological question, but we all can agree that children have been defying parents since bygones \u0026#x26; Sikhi even celebrates that.\u003c/p\u003e\n\u003cp\u003eThe number of times Prahlad's story is mentioned in Sikhi, makes me feel that Gurus didn't really want Sikhs to become obedient children of their parents, but rather be autonomous and sovereign. Defiance against old systems is pretty much a norm in Sikhi.\u003c/p\u003e\n\u003cp\u003eControlling parents and \u003ca href=\"https://www.psychologytoday.com/us/blog/insight-is-2020/201405/narcissistic-parents-psychological-effect-their-children\"\u003eemotional abuse by narcissistic parents\u003c/a\u003e is not a new story, and it even needed intervention by Vishnu themself to save Prahlad.\u003c/p\u003e\n\u003cp\u003eIf \u003ca href=\"https://www.psychologytoday.com/us/blog/the-legacy-distorted-love/201802/the-real-effect-narcissistic-parenting-children\"\u003eyou're a victim\u003c/a\u003e of such emotional abuse by controlling parents, you may take inspiration from this epic.\u003c/p\u003e\n","fileName":"How Holi is related to narcissism and patriarchy.md","readingTimeMinutes":4}]},"__N_SSG":true},"page":"/blog/tags/[tag]","query":{"tag":"prahlad"},"buildId":"AJwyyoNUuUrG_2erPl38S","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
